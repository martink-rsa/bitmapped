name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm --filter bitmapped test:snapshot-report
      - run: pnpm build
      - run: pnpm --filter bitmapped exec publint
      - run: pnpm --filter bitmapped exec attw --pack .
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-fixtures
          path: packages/bitmapped/src/__fixtures__/
